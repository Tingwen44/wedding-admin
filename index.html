<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼邀请函 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-card.blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .stat-card.green {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-card.orange {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .stat-card.purple {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .table-section {
            margin-top: 40px;
        }
        
        .table-section h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        table thead {
            background-color: #f0f0f0;
        }
        
        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        
        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #666;
        }
        
        table tbody tr:hover {
            background-color: #f9f9f9;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background-color: #5568d3;
        }
        
        .last-update {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.yes {
            background-color: #d4edda;
            color: #155724;
        }
        
        .badge.no {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>婚礼邀请函 - 管理后台</h1>
        
        <button class="refresh-btn" onclick="loadData()">刷新数据</button>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="loading" class="loading">加载中...</div>
        
        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-container">
                <div class="stat-card blue">
                    <h3>总回复数</h3>
                    <div class="number" id="total-responses">0</div>
                </div>
                <div class="stat-card green">
                    <h3>总参与人数</h3>
                    <div class="number" id="total-guests">0</div>
                </div>
                <div class="stat-card orange">
                    <h3>需要住宿</h3>
                    <div class="number" id="accommodation-count">0</div>
                </div>
                <div class="stat-card purple">
                    <h3>参加 After Party</h3>
                    <div class="number" id="after-party-count">0</div>
                </div>
            </div>
            
            <!-- 地点统计表格 -->
            <div class="table-section">
                <h2>各地点参与情况</h2>
                <table>
                    <thead>
                        <tr>
                            <th>婚礼地点</th>
                            <th>回复数</th>
                            <th>参与人数</th>
                        </tr>
                    </thead>
                    <tbody id="location-stats">
                        <tr><td colspan="3" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 住宿统计表格 -->
            <div class="table-section">
                <h2>住宿需求统计</h2>
                <table>
                    <thead>
                        <tr>
                            <th>房间类型</th>
                            <th>需求数</th>
                        </tr>
                    </thead>
                    <tbody id="accommodation-stats">
                        <tr><td colspan="2" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 所有回复详情表格 -->
            <div class="table-section">
                <h2>所有回复详情</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>嘉宾姓名</th>
                            <th>参与人数</th>
                            <th>参与亲友姓名</th>
                            <th>婚礼地点</th>
                            <th>住宿日期</th>
                            <th>房间类型</th>
                            <th>After Party</th>
                            <th>提交时间</th>
                        </tr>
                    </thead>
                    <tbody id="responses-table">
                        <tr><td colspan="9" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="last-update">
                最后更新: <span id="last-update-time">-</span>
            </div>
        </div>
    </div>
    
    <script>
        const BACKEND_URL = 'https://wedding-backend-production-6728.up.railway.app';
        const ADMIN_TOKEN = 'Silentmafia001';
        
        async function loadData() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('content').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                
                // 获取统计数据
                const statsResponse = await fetch(`${BACKEND_URL}/api/rsvp/stats?token=${ADMIN_TOKEN}`);
                if (!statsResponse.ok) throw new Error('获取统计数据失败');
                const stats = await statsResponse.json();
                
                // 获取详细数据
                const listResponse = await fetch(`${BACKEND_URL}/api/rsvp/list?token=${ADMIN_TOKEN}`);
                if (!listResponse.ok) throw new Error('获取回复列表失败');
                const listData = await listResponse.json();
                
                // 更新统计卡片
                document.getElementById('total-responses').textContent = stats.total_responses || 0;
                document.getElementById('total-guests').textContent = stats.total_guests || 0;
                document.getElementById('accommodation-count').textContent = stats.accommodation_needed || 0;
                document.getElementById('after-party-count').textContent = stats.after_party_yes || 0;
                
                // 更新地点统计表格
                const locationStats = stats.by_location || {};
                const locationHtml = Object.entries(locationStats).map(([location, count]) => `
                    <tr>
                        <td>${location}</td>
                        <td>${count.responses || 0}</td>
                        <td>${count.guests || 0}</td>
                    </tr>
                `).join('');
                document.getElementById('location-stats').innerHTML = locationHtml || '<tr><td colspan="3" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新住宿统计表格
                const accommodationStats = stats.by_room_type || {};
                const accommodationHtml = Object.entries(accommodationStats).map(([type, count]) => `
                    <tr>
                        <td>${type}</td>
                        <td>${count}</td>
                    </tr>
                `).join('');
                document.getElementById('accommodation-stats').innerHTML = accommodationHtml || '<tr><td colspan="2" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新回复详情表格
                const responses = listData.data || [];
                const responsesHtml = responses.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.guest_name}</td>
                        <td>${r.guest_count}</td>
                        <td>${r.accompanying_guests || '-'}</td>
                        <td>${r.wedding_location}</td>
                        <td>${r.accommodation_dates}</td>
                        <td>${r.room_type || '-'}</td>
                        <td><span class="badge ${r.after_party ? 'yes' : 'no'}">${r.after_party ? '参加' : '不参加'}</span></td>
                        <td>${new Date(r.created_at).toLocaleString('zh-CN')}</td>
                    </tr>
                `).join('');
                document.getElementById('responses-table').innerHTML = responsesHtml || '<tr><td colspan="9" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新最后更新时间
                document.getElementById('last-update-time').textContent = new Date().toLocaleString('zh-CN');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载数据出错:', error);
                document.getElementById('error').textContent = '加载数据失败: ' + error.message;
                document.getElementById('error').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // 页面加载时自动刷新数据
        window.addEventListener('load', loadData);
        
        // 每 30 秒自动刷新一次
        setInterval(loadData, 30000);
    </script>
</body>
</html>
