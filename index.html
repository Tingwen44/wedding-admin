<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼邀请函 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-card.blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .stat-card.green {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-card.orange {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .stat-card.purple {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .table-section {
            margin-top: 40px;
        }
        
        .table-section h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .pagination button,
        .pagination span {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background-color: white;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .pagination button:hover {
            background-color: #f0f0f0;
        }
        
        .pagination button.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination span {
            border: none;
            cursor: default;
            background-color: transparent;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        
        table thead {
            background-color: #f0f0f0;
        }
        
        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        
        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #666;
            word-break: break-word;
        }
        
        table tbody tr:hover {
            background-color: #f9f9f9;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background-color: #5568d3;
        }
        
        .last-update {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.yes {
            background-color: #d4edda;
            color: #155724;
        }
        
        .badge.no {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .page-info {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>婚礼邀请函 - 管理后台</h1>
        
        <button class="refresh-btn" onclick="loadData()">刷新数据</button>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="loading" class="loading">加载中...</div>
        
        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-container">
                <div class="stat-card blue">
                    <h3>总回复数</h3>
                    <div class="number" id="total-responses">0</div>
                </div>
                <div class="stat-card green">
                    <h3>总参与人数</h3>
                    <div class="number" id="total-guests">0</div>
                </div>
                <div class="stat-card orange">
                    <h3>需要住宿</h3>
                    <div class="number" id="accommodation-count">0</div>
                </div>
                <div class="stat-card purple">
                    <h3>参加 After Party</h3>
                    <div class="number" id="after-party-count">0</div>
                </div>
            </div>
            
            <!-- 地点统计表格 -->
            <div class="table-section">
                <h2>各地点参与情况</h2>
                <table>
                    <thead>
                        <tr>
                            <th>婚礼地点</th>
                            <th>回复数</th>
                            <th>参与人数</th>
                        </tr>
                    </thead>
                    <tbody id="location-stats">
                        <tr><td colspan="3" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 住宿统计表格 -->
            <div class="table-section">
                <h2>住宿需求统计</h2>
                <table>
                    <thead>
                        <tr>
                            <th>房间类型</th>
                            <th>需求数</th>
                        </tr>
                    </thead>
                    <tbody id="accommodation-stats">
                        <tr><td colspan="2" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 所有回复详情表格 -->
            <div class="table-section">
                <h2>所有回复详情（最近 3 个月）</h2>
                <div class="table-controls">
                    <div class="page-info" id="page-info">加载中...</div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>嘉宾姓名</th>
                                <th>参与人数</th>
                                <th>参与亲友姓名</th>
                                <th>婚礼地点</th>
                                <th>住宿日期</th>
                                <th>房间类型</th>
                                <th>After Party</th>
                                <th>提交时间</th>
                            </tr>
                        </thead>
                        <tbody id="responses-table">
                            <tr><td colspan="9" style="text-align: center; color: #999;">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
            
            <div class="last-update">
                最后更新: <span id="last-update-time">-</span>
            </div>
        </div>
    </div>
    
    <script>
        const BACKEND_URL = 'https://wedding-backend-production-6728.up.railway.app';
        const ADMIN_TOKEN = 'Silentmafia001';
        
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;
        
        async function loadData(page = 1) {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('content').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                
                // 获取统计数据
                const statsResponse = await fetch(`${BACKEND_URL}/api/rsvp/stats?token=${ADMIN_TOKEN}`);
                if (!statsResponse.ok) throw new Error('获取统计数据失败');
                const stats = await statsResponse.json();
                
                // 获取分页数据
                const listResponse = await fetch(`${BACKEND_URL}/api/rsvp/list?token=${ADMIN_TOKEN}&page=${page}&pageSize=${pageSize}`);
                if (!listResponse.ok) throw new Error('获取回复列表失败');
                const listData = await listResponse.json();
                
                // 更新统计卡片
                document.getElementById('total-responses').textContent = listData.total || 0;
                
                // 计算总参与人数
                let totalGuests = 0;
                let accommodationNeeded = 0;
                let afterPartyYes = 0;
                
                // 需要获取所有数据来计算统计（因为我们只显示一页）
                const allListResponse = await fetch(`${BACKEND_URL}/api/rsvp/list?token=${ADMIN_TOKEN}&page=1&pageSize=10000`);
                if (allListResponse.ok) {
                    const allListData = await allListResponse.json();
                    allListData.data.forEach(r => {
                        totalGuests += r.guest_count;
                        if (r.room_type && r.room_type !== '-' && r.room_type !== '不住宿') {
                            accommodationNeeded++;
                        }
                        if (r.after_party) {
                            afterPartyYes++;
                        }
                    });
                }
                
                document.getElementById('total-guests').textContent = totalGuests || 0;
                document.getElementById('accommodation-count').textContent = accommodationNeeded || 0;
                document.getElementById('after-party-count').textContent = afterPartyYes || 0;
                
                // 更新地点统计表格
                const locationStats = stats.data || [];
                const locationHtml = locationStats.map(item => `
                    <tr>
                        <td>${item.wedding_location}</td>
                        <td>${item.count || 0}</td>
                        <td>${item.total_guests || 0}</td>
                    </tr>
                `).join('');
                document.getElementById('location-stats').innerHTML = locationHtml || '<tr><td colspan="3" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新住宿统计表格（从所有数据中计算）
                const roomTypeStats = {};
                if (allListResponse.ok) {
                    const allListData = await allListResponse.json();
                    allListData.data.forEach(r => {
                        const roomType = r.room_type || '无';
                        roomTypeStats[roomType] = (roomTypeStats[roomType] || 0) + 1;
                    });
                }
                
                const accommodationHtml = Object.entries(roomTypeStats).map(([type, count]) => `
                    <tr>
                        <td>${type}</td>
                        <td>${count}</td>
                    </tr>
                `).join('');
                document.getElementById('accommodation-stats').innerHTML = accommodationHtml || '<tr><td colspan="2" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新回复详情表格
                const responses = listData.data || [];
                const responsesHtml = responses.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.guest_name}</td>
                        <td>${r.guest_count}</td>
                        <td>${r.accompanying_guests || '-'}</td>
                        <td>${r.wedding_location}</td>
                        <td>${r.accommodation_dates || '-'}</td>
                        <td>${r.room_type || '-'}</td>
                        <td><span class="badge ${r.after_party ? 'yes' : 'no'}">${r.after_party ? '参加' : '不参加'}</span></td>
                        <td>${new Date(r.created_at).toLocaleString('zh-CN')}</td>
                    </tr>
                `).join('');
                document.getElementById('responses-table').innerHTML = responsesHtml || '<tr><td colspan="9" style="text-align: center; color: #999;">暂无数据</td></tr>';
                
                // 更新分页信息
                currentPage = listData.currentPage || 1;
                totalPages = listData.totalPages || 1;
                const pageInfo = `第 ${currentPage} 页，共 ${totalPages} 页（总共 ${listData.total} 条记录）`;
                document.getElementById('page-info').textContent = pageInfo;
                
                // 生成分页按钮
                generatePagination();
                
                // 更新最后更新时间
                document.getElementById('last-update-time').textContent = new Date().toLocaleString('zh-CN');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载数据出错:', error);
                document.getElementById('error').textContent = '加载数据失败: ' + error.message;
                document.getElementById('error').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function generatePagination() {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            
            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    loadData(currentPage - 1);
                }
            };
            paginationDiv.appendChild(prevBtn);
            
            // 页码按钮
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.textContent = '1';
                firstBtn.onclick = () => loadData(1);
                paginationDiv.appendChild(firstBtn);
                
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    paginationDiv.appendChild(dots);
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === currentPage ? 'active' : '';
                pageBtn.onclick = () => loadData(i);
                paginationDiv.appendChild(pageBtn);
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    paginationDiv.appendChild(dots);
                }
                
                const lastBtn = document.createElement('button');
                lastBtn.textContent = totalPages;
                lastBtn.onclick = () => loadData(totalPages);
                paginationDiv.appendChild(lastBtn);
            }
            
            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    loadData(currentPage + 1);
                }
            };
            paginationDiv.appendChild(nextBtn);
        }
        
        // 页面加载时自动刷新数据
        window.addEventListener('load', () => loadData(1));
        
        // 每 30 秒自动刷新一次
        setInterval(() => loadData(currentPage), 30000);
    </script>
</body>
</html>
